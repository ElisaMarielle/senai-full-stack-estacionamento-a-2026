<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamento ACME — Cadastrar Estadias</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/cad.css">
</head>
<body>
    <header>
        <div class="left">
            <h1>Estacionamento ACME</h1>
            <a href="./index.html">Lista</a>
        </div>
        <div class="right">
            <a href="cadaut.htm">Cadastrar automóveis</a>
            <a href="cadest.htm">Cadastrar estadia</a>
        </div>
    </header>

    <main>
        <div class="modal" id="modal">
            <form action="" id="form-est">
                <h2>Cadastrar nova estadia</h2>
                <!----------------->
                <label for="nome">Nome do proprietário</label>
                <input type="text" id="nome" required>
                <!----------------->
                <label for="placa">Placa do veículo</label>
                <input type="text" id="placa" required>
                <!----------------->
                <label for="valorHora">Valor por hora</label>
                <input type="number" id="valorHora">
                <!----------------->
                <div class="form-btns">
                    <button type="submit">Salvar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../cadastros.js"></script>
</body>
</html>
